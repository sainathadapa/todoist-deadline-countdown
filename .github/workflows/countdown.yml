name: countdown
on:
  schedule:
    - cron: '5 */3 * * *'   # every 3 hours at :05 (off-the-hour for better scheduler reliability)
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-extras
      - run: uv run python -m countdown
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          COUNTDOWN_TZ: ${{ vars.COUNTDOWN_TZ }}
